version: "3.9"

services:
  postgres:
    image: postgres:17

    container_name: finance_data_platform

    restart: unless-stopped

    environment:
      POSTGRES_DB: finance
      POSTGRES_USER: finance
      POSTGRES_PASSWORD: finance

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: